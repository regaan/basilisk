name: Build, Sign, and Release Basilisk Desktop

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock ]; then
            pip install -r requirements.lock
            pip install --no-deps .
          else
            pip install .
            pip install pyinstaller
          fi

      - name: Install Extra Python Dependencies
        run: |
          if [ ! -f requirements.lock ]; then
            pip install uvicorn fastapi websockets aiohttp pyyaml click rich jinja2 litellm jaraco.text jaraco.functools jaraco.context
          fi
        shell: bash

      - name: Install Linux Build Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools imagemagick build-essential gcc

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          install: >-
            mingw-w64-x86_64-gcc
            make

      - name: Build Native Extensions
        run: |
          chmod +x native/build.sh
          ./native/build.sh all
        shell: bash

      - name: Compile Python Sidecar
        run: |
          pyinstaller basilisk-backend.spec

      - name: Prepare Desktop Folder (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p desktop/bin
          cp dist/basilisk-backend desktop/bin/
        shell: bash

      - name: Prepare Desktop Folder (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p desktop/bin
          cp dist/basilisk-backend.exe desktop/bin/basilisk-backend.exe
        shell: bash

      - name: Install Desktop Dependencies
        working-directory: ./desktop
        run: npm install

      - name: Prepare Icons
        working-directory: ./desktop
        run: |
          mkdir -p build
          if command -v magick &> /dev/null; then
            magick src/assets/logo.jpg -resize 512x512 build/icon.png
            magick src/assets/logo.jpg -resize 256x256 build/icon.ico
          elif command -v convert &> /dev/null; then
            convert src/assets/logo.jpg -resize 512x512 build/icon.png
          elif command -v sips &> /dev/null; then
            sips -s format png -Z 512 src/assets/logo.jpg --out build/icon.png
          else
            cp src/assets/logo.jpg build/icon.png
          fi
          if [ "${{ runner.os }}" = "macOS" ]; then
            mkdir -p build/icon.iconset
            for size in 16 32 64 128 256 512; do
              sips -z "$size" "$size" src/assets/logo.jpg --out "build/icon.iconset/icon_${size}x${size}.png"
              if [ "$size" -lt 512 ]; then
                double=$((size * 2))
                sips -z "$double" "$double" src/assets/logo.jpg --out "build/icon.iconset/icon_${size}x${size}@2x.png"
              fi
            done
            iconutil -c icns build/icon.iconset -o build/icon.icns
          fi
        shell: bash

      - name: Copy License
        working-directory: ./desktop
        run: |
          cp ../LICENSE LICENSE.txt || echo "MIT License" > LICENSE.txt
        shell: bash

      - name: Prepare Build Trust Metadata
        env:
          BASILISK_HAS_APPLE_SIGNING: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_CERT_BASE64 != '' && secrets.APPLE_TEAM_ID != '' }}
          BASILISK_HAS_APPLE_NOTARIZATION: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID != '' && ((secrets.APPLE_API_KEY_BASE64 != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER != '') || (secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '')) }}
          BASILISK_HAS_WINDOWS_SIGNING: ${{ runner.os == 'Windows' && secrets.WINDOWS_SIGNING_CERT_BASE64 != '' }}
        run: |
          python scripts/write_build_metadata.py \
            --platform "${{ runner.os }}" \
            --output desktop/build/release-channel.json \
            --github-env "$GITHUB_ENV"
        shell: bash

      - name: Setup Apple Code Signing Identity
        if: runner.os == 'macOS' && secrets.APPLE_SIGNING_CERT_BASE64 != ''
        env:
          APPLE_SIGNING_CERT_BASE64: ${{ secrets.APPLE_SIGNING_CERT_BASE64 }}
          APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/apple-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/basilisk-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          echo "$APPLE_SIGNING_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_SIGNING_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
        shell: bash

      - name: Setup Apple Notarization Credentials
        if: runner.os == 'macOS' && secrets.APPLE_TEAM_ID != ''
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
          if [ -n "$APPLE_API_KEY_BASE64" ] && [ -n "$APPLE_API_KEY_ID" ] && [ -n "$APPLE_API_ISSUER" ]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
            echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
          elif [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD" >> "$GITHUB_ENV"
          fi
        shell: bash

      - name: Setup Windows Code Signing Certificate
        if: runner.os == 'Windows' && secrets.WINDOWS_SIGNING_CERT_BASE64 != ''
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "basilisk-windows-signing.p12"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_BASE64))
          $link = "file:///" + ($certPath -replace "\\","/")
          "CSC_LINK=$link" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CSC_KEY_PASSWORD=$env:WINDOWS_SIGNING_CERT_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Electron App
        working-directory: ./desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish never

      - name: Copy Build Metadata for Release Artifacts
        run: |
          cp desktop/build/release-channel.json desktop/dist/basilisk-build-metadata.json
        shell: bash

      - name: Staple macOS Artifacts
        if: runner.os == 'macOS' && secrets.APPLE_SIGNING_CERT_BASE64 != ''
        working-directory: ./desktop
        run: |
          find dist -maxdepth 3 \( -name '*.app' -o -name '*.dmg' -o -name '*.zip' \) -print0 | while IFS= read -r -d '' file; do
            xcrun stapler staple "$file" || true
          done
        shell: bash

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Basilisk-${{ matrix.os }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.AppImage
            desktop/dist/*.pacman
            desktop/dist/*.deb
            desktop/dist/*.rpm
            desktop/dist/*.zip
            desktop/dist/*.tar.gz
            desktop/dist/basilisk-build-metadata.json
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List Downloaded Files
        run: find artifacts/ -type f | head -50

      - name: Generate Release Metadata
        run: |
          python scripts/generate_release_manifest.py --artifact-root artifacts --build-metadata-root artifacts

      - name: Render Release Notes
        run: |
          python scripts/render_release_notes.py \
            --tag "${{ github.ref_name }}" \
            --artifacts-root artifacts \
            --output build/release-notes.md

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign Release Artifacts and Metadata
        env:
          COSIGN_YES: "true"
          COSIGN_EXPERIMENTAL: "1"
          COSIGN_KEY_REF: ${{ secrets.COSIGN_KEY_REF }}
        run: |
          mapfile -t FILES < <(find artifacts build -type f \
            \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.pacman' -o -name '*.deb' -o -name '*.rpm' -o -name '*.zip' -o -name '*.tar.gz' -o -name '*.json' \) | sort)
          for file in "${FILES[@]}"; do
            if [ -n "$COSIGN_KEY_REF" ]; then
              cosign sign-blob --yes --key "$COSIGN_KEY_REF" \
                --output-signature "${file}.sig" \
                --output-certificate "${file}.pem" \
                "$file"
            else
              cosign sign-blob --yes \
                --output-signature "${file}.sig" \
                --output-certificate "${file}.pem" \
                "$file"
            fi
          done

      - name: Upload Security Metadata
        uses: actions/upload-artifact@v4
        with:
          name: Basilisk-release-security
          path: |
            build/release-manifest.json
            build/sbom.json
            build/provenance.json
            build/**/*.sig
            build/**/*.pem
            artifacts/**/*.sig
            artifacts/**/*.pem

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Basilisk ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          fail_on_unmatched_files: false
          body_path: build/release-notes.md
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.pacman
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/basilisk-build-metadata.json
            build/release-manifest.json
            build/sbom.json
            build/provenance.json
            build/**/*.sig
            build/**/*.pem
            artifacts/**/*.sig
            artifacts/**/*.pem
        continue-on-error: true

      - name: Upload Assets via CLI (fallback)
        if: failure() || success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find artifacts build -type f \
            \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.pacman' -o -name '*.deb' -o -name '*.rpm' -o -name '*.zip' -o -name '*.json' -o -name '*.sig' -o -name '*.pem' \) \
            -print0 | while IFS= read -r -d '' file; do
              gh release upload "${{ github.ref_name }}" "$file" --clobber || true
            done
        shell: bash
